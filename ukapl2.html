  <style>
  :root {
    --bg: #f5f5f7;
    --surface: #ececee;
    --surface-2: #e4e4e7;
    --ink: #0a0a0a;
    --muted: #6e6e73;
    --border: #d2d2d7;
    --radius-lg: 20px;
    --radius-md: 14px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  .wrap {
    max-width: 440px;
    margin: 0 auto;
    padding: 18px 22px 44px;
  }
  .hero-title {
    font-weight: 700;
    font-size: 30px;
    line-height: 1.1;
    letter-spacing: -0.025em;
    text-align: center;
    margin: 4px 0 10px;
    color: var(--ink);
  }
  .hero-sub {
    text-align: center;
    color: var(--muted);
    font-size: 15px;
    line-height: 1.45;
    margin: 0 0 18px;
    font-weight: 400;
    letter-spacing: -0.005em;
  }
  .card-image {
    display: block;
    width: 100%;
    height: auto;
    border-radius: var(--radius-lg);
    box-shadow:
      0 12px 28px -16px rgba(0,0,0,0.45),
      0 4px 10px -6px rgba(0,0,0,0.25);
    margin-bottom: 20px;
  }
  .cta {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: var(--radius-md);
    padding: 18px 22px;
    font-size: 16px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: -0.005em;
    transition: transform .12s ease, background .2s ease;
    box-shadow: 0 6px 16px -10px rgba(0,0,0,0.4);
    margin-top: 20px;
    text-decoration: none;
  }
  .cta:hover { background: #1a1a1a; }
  .cta:active { transform: scale(0.985); }
  .cta .arrow { transition: transform .2s ease; display: inline-block; }
  .cta:hover .arrow { transform: translateX(3px); }
  .section-head {
    display: flex;
    align-items: center;
    gap: 11px;
    margin: 4px 0 12px;
  }
  .section-head h2 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.022em;
    margin: 0;
  }
  .steps { display: flex; flex-direction: column; gap: 11px; }
  .step {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    border-radius: var(--radius-md);
    padding: 16px 16px;
    transition: background .2s ease;
  }
  .step:hover { background: var(--surface-2); }
  .step-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: #dcdcde;
    display: grid;
    place-items: center;
    flex-shrink: 0;
  }
  .step-icon svg {
    width: 20px;
    height: 20px;
    stroke: var(--ink);
    fill: none;
    stroke-width: 1.6;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .step-body { flex: 1; min-width: 0; }
  .step-title {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.012em;
    color: var(--ink);
    line-height: 1.3;
    margin: 0 0 3px;
  }
  .step-sub {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.35;
    margin: 0;
    font-weight: 400;
  }
  .step-num {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--ink);
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    display: grid;
    place-items: center;
    flex-shrink: 0;
    margin-left: 4px;
  }
  </style>
</head>
