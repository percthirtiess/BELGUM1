<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apple Cash Program</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #080808;
      color: #e6e6e6;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      background-color: #0f0f0f;
      border: 1px solid #242424;
      border-radius: 18px;
      overflow: hidden;
      width: 100%;
      max-width: 340px;
      padding: 32px 24px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .icon-box {
      width: 64px;
      height: 64px;
      background-color: #1f1f1f;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.6);
    }

    .icon-box svg {
      width: 30px;
      height: 30px;
      fill: #e6e6e6;
    }

    .label {
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #808080;
      font-weight: 500;
      margin-bottom: 10px;
    }

    .stars {
      display: flex;
      gap: 3px;
      justify-content: center;
      margin-bottom: 6px;
    }

    .stars svg {
      width: 16px;
      height: 16px;
      fill: #cccccc;
    }

    .review-text {
      font-size: 12px;
      color: #808080;
      margin-bottom: 18px;
    }

    .review-text strong {
      color: #e6e6e6;
      font-weight: 600;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #f2f2f2;
      line-height: 1.3;
      margin-bottom: 10px;
    }

    .desc {
      font-size: 12px;
      color: #808080;
      line-height: 1.8;
      margin-bottom: 26px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 15px 32px;
      background-color: #f2f2f2;
      color: #0d0d0d;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      box-shadow: 0 0 28px rgba(180,180,180,0.18);
      transition: background-color 0.15s ease, transform 0.1s ease;
    }

    .btn:hover { background-color: #e0e0e0; }
    .btn:active { transform: scale(0.97); }
  </style>
</head>
