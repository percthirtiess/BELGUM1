<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#fff;color:#111;font-family:'Inter',-apple-system,sans-serif;min-height:100vh}
.page-container{width:100%;max-width:440px;margin:0 auto;display:flex;flex-direction:column}
.header{padding:24px 24px 32px;text-align:center;border-bottom:1px solid #eee}
.brand-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:20px}
.brand-dot{width:12px;height:12px;background:#00D632;border-radius:50%}
.brand-name{font-size:13px;font-weight:700;color:#555;letter-spacing:1.2px;text-transform:uppercase}
.reward-amount{font-size:64px;font-weight:800;color:#111;line-height:1;margin-bottom:8px;letter-spacing:-3px}
.reward-label{font-size:15px;color:#888}
.main-content{padding:28px 24px}
.steps-indicator{display:flex;gap:8px;margin-bottom:32px}
.step-bar{flex:1;height:4px;background:#eee;border-radius:2px}
.step-bar.active{background:#00D632}
.question{font-size:28px;font-weight:700;color:#111;line-height:1.25;margin-bottom:32px}
.options-yn{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.yn-opt{border:1.5px solid #e5e5e5;border-radius:12px;padding:22px 16px;text-align:center;cursor:pointer;transition:all 0.15s;background:#fff;font-size:16px;font-weight:600;color:#222;font-family:'Inter',sans-serif;width:100%}
.yn-opt:hover{border-color:#00D632;background:#f8fff9;color:#00a828}
.yn-opt:active{transform:scale(0.97)}
.footer-actions{padding:0 24px 20px}
.btn-next{width:100%;padding:16px 24px;border:none;border-radius:12px;background:#00D632;font-size:16px;font-weight:700;color:#fff;cursor:pointer;font-family:'Inter',sans-serif}
.legal{padding:12px 24px 24px;text-align:center}
.legal a{font-size:12px;color:#bbb;text-decoration:none}
</style>
</head>
<body>

<div class="page-container">

  <div class="header">
    <div class="brand-row">
      <div class="brand-dot"></div>
      <span class="brand-name">Cash App</span>
    </div>
    <div class="reward-amount">$750</div>
    <div class="reward-label">Eligibility Check</div>
  </div>

  <div class="main-content">
    <div class="steps-indicator">
      <div class="step-bar active"></div>
      <div class="step-bar"></div>
      <div class="step-bar"></div>
    </div>
    <div class="question">Do you use Cash App?</div>
    <div class="options-yn">
      <button class="yn-opt" id="btnYes">Yes</button>
      <button class="yn-opt" id="btnNo">No</button>
    </div>
  </div>

  <div class="footer-actions">
    <button class="btn-next" id="btnContinue">Continue</button>
  </div>

  <div class="legal">
    <a href="https://www.theloopshops.com/privacy-policy">Privacy</a> · <a href="https://www.theloopshops.com/privacy-policy">Terms</a>
  </div>

</div>

<script>
(function(){

  var CTA_LINK = 'https://track.gethourlyrewards.com/cf/click';
  var _p = window._fbParams || new URLSearchParams(window.location.search);

  function fireLeadAndGo() {
    var _tec = _p.get('test_event_code');

    var eventData = {
      currency: 'USD',
      value: 1.00
    };
    var campaignFields = ['campaign_id','campaign_name','adset_id','adset_name','ad_id','ad_name'];
    campaignFields.forEach(function(k){
      var v = _p.get(k);
      if(v) eventData[k] = v;
    });

    // 1. fbq JS pixel
    if (typeof fbq !== 'undefined') {
      if (_tec) {
        fbq('track', 'Lead', eventData, {eventID: 'lead_' + Date.now(), testEventCode: _tec});
      } else {
        fbq('track', 'Lead', eventData, {eventID: 'lead_' + Date.now()});
      }
    }

    // 2. sendBeacon fallback
    var beaconUrl = 'https://www.facebook.com/tr?id=2133166377443921&ev=Lead'
      + '&cd[currency]=USD&cd[value]=1.00&noscript=1&t=' + Date.now();
    var cid = _p.get('campaign_id'), aid = _p.get('ad_id');
    if (cid) beaconUrl += '&cd[campaign_id]=' + encodeURIComponent(cid);
    if (aid) beaconUrl += '&cd[ad_id]='       + encodeURIComponent(aid);
    if (_tec) beaconUrl += '&test_event_code=' + encodeURIComponent(_tec);

    if (navigator.sendBeacon) {
      navigator.sendBeacon(beaconUrl);
    } else {
      new Image().src = beaconUrl;
    }

    // 3. Navigate to CTA
    setTimeout(function(){ window.location.href = CTA_LINK; }, 100);
  }

  // Yes and No both fire Lead and go to CTA
  document.getElementById('btnYes').addEventListener('click', fireLeadAndGo);
  document.getElementById('btnNo').addEventListener('click', fireLeadAndGo);

  // Continue button also works (in case they click it without selecting)
  document.getElementById('btnContinue').addEventListener('click', fireLeadAndGo);

})();
</script>

</body>
</html>
